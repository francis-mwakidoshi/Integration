apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: country-info-service-hpa
  namespace: country-info
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: country-info-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
